<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<title>Formulaire d'inscription</title>
</head>
<body>

	<h1>Formulaire d'inscription</h1>

	<form method="POST" action="traitement.php">

		<label>Nom :</label>
		<input type="text" name="nom" required><br><br>

		<label>Email :</label>
		<input type="text" name="email" required><br><br>

		<label>Login :</label>
		<input type="text" name="login" required><br><br>

		<label>Password :</label>
		<input type="password" name="mdp" required><br><br>

		<label>Type d'utilisateur :</label>
		<select name="type">
			<option value="Utilisateur">Utilisateur</option>
			<option value="Administrateur">Administrateur</option>
		</select><br><br>

		<label>Genre :</label><br>
		<input type="radio" name="genre" value="Homme" checked> Homme
		<input type="radio" name="genre" value="Femme"> Femme<br><br>

		<label>Préférences :</label><br>
		<input type="checkbox" name="preferences[]" value="Newsletter"> Recevoir la newsletter<br>
		<input type="checkbox" name="preferences[]" value="Promotions"> Recevoir les promotions<br><br>

		<label>Description :</label><br>
		<textarea name="description" rows="4" cols="40"></textarea><br><br>

		<label>Permissions (pour Administrateur/ gérer) :</label><br>
		<input type="checkbox" name="permissions[]" value="gest users"> Users
		<input type="checkbox" name="permissions[]" value="gest prods"> Produits
		<input type="checkbox" name="permissions[]" value="gest livreurs"> Livreur<br><br>

		<input type="submit" value="Envoyer">

	</form>

</body>
</html>
